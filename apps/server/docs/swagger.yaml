openapi: 3.0.3
info:
  title: SubPilot API
  version: 0.1.0
  description: Initial API documentation scaffold for SubPilot.
servers:
  - url: /api/v1
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ResponseEnvelope:
      type: object
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          nullable: true
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
    AuthResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          example: 86400
        user:
          $ref: "#/components/schemas/User"
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        name:
          type: string
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Streaming
        color:
          type: string
          example: "#0ea5e9"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 120
          example: Streaming
        color:
          type: string
          maxLength: 32
          example: "#0ea5e9"
    Subscription:
      type: object
      properties:
        id:
          type: string
          format: uuid
        category_id:
          type: string
          format: uuid
          nullable: true
        category:
          $ref: "#/components/schemas/Category"
        name:
          type: string
          example: Netflix
        amount:
          type: number
          format: double
          example: 15.99
        currency:
          type: string
          example: USD
        billing_cycle:
          type: string
          enum: [monthly, yearly, custom]
        next_payment_date:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, paused, canceled]
        notes:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SubscriptionRequest:
      type: object
      required:
        - name
        - amount
        - currency
        - billing_cycle
        - next_payment_date
      properties:
        category_id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 160
          example: Netflix
        amount:
          type: number
          format: double
          minimum: 0
          exclusiveMinimum: true
          example: 15.99
        currency:
          type: string
          minLength: 3
          maxLength: 3
          example: USD
        billing_cycle:
          type: string
          enum: [monthly, yearly, custom]
        next_payment_date:
          type: string
          example: "2026-06-01"
        status:
          type: string
          enum: [active, paused, canceled]
          default: active
        notes:
          type: string
          maxLength: 2000
    SubscriptionList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Subscription"
        page:
          type: integer
          example: 1
        page_size:
          type: integer
          example: 20
        total:
          type: integer
          example: 1
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          service:
                            type: string
                            example: SubPilot
                          status:
                            type: string
                            example: ok
  /auth/register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "200":
          description: User registered
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request
        "409":
          description: Email already exists
  /auth/login:
    post:
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: User logged in
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Invalid request
        "401":
          description: Invalid credentials
  /auth/me:
    get:
      summary: Get the current authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/User"
        "401":
          description: Missing or invalid token
        "404":
          description: User not found
  /categories:
    post:
      summary: Create a category
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "200":
          description: Category created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Category"
        "400":
          description: Invalid request
        "401":
          description: Missing or invalid token
        "409":
          description: Category name already exists
    get:
      summary: List categories
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Category"
        "401":
          description: Missing or invalid token
  /categories/{id}:
    put:
      summary: Update a category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Category"
        "400":
          description: Invalid request
        "401":
          description: Missing or invalid token
        "404":
          description: Category not found
  /subscriptions:
    post:
      summary: Create a subscription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionRequest"
      responses:
        "200":
          description: Subscription created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Subscription"
        "400":
          description: Invalid request
        "401":
          description: Missing or invalid token
        "404":
          description: Category not found
    get:
      summary: List subscriptions
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
        - name: page_size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: status
          in: query
          schema:
            type: string
            enum: [active, paused, canceled]
        - name: category_id
          in: query
          schema:
            type: string
            format: uuid
        - name: billing_cycle
          in: query
          schema:
            type: string
            enum: [monthly, yearly, custom]
      responses:
        "200":
          description: Subscriptions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/SubscriptionList"
        "400":
          description: Invalid query
        "401":
          description: Missing or invalid token
  /subscriptions/{id}:
    get:
      summary: Get subscription detail
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Subscription detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Subscription"
        "400":
          description: Invalid subscription ID
        "401":
          description: Missing or invalid token
        "404":
          description: Subscription not found
    put:
      summary: Update a subscription
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionRequest"
      responses:
        "200":
          description: Subscription updated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Subscription"
        "400":
          description: Invalid request
        "401":
          description: Missing or invalid token
        "404":
          description: Subscription or category not found
    delete:
      summary: Delete a subscription
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Subscription deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Subscription"
        "400":
          description: Invalid subscription ID
        "401":
          description: Missing or invalid token
        "404":
          description: Subscription not found
        "409":
          description: Category name already exists
    delete:
      summary: Delete a category
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Category deleted
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ResponseEnvelope"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/Category"
        "400":
          description: Invalid category ID
        "401":
          description: Missing or invalid token
        "404":
          description: Category not found
