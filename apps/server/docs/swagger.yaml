openapi: 3.0.3
info:
  title: SubPilot API
  version: 0.1.0
  description: Initial API documentation scaffold for SubPilot.
servers:
  - url: /api/v1
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 0
                  message:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      service:
                        type: string
                        example: SubPilot
                      status:
                        type: string
                        example: ok
